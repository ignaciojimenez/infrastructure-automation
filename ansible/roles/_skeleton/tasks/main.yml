#   tags: ["{role_name}", config]

# ============================================================
# Service Management
# ============================================================

- name: Ensure {role_name} service is enabled and started
  become: true
  ansible.builtin.service:
    name: "{role_name}"
    enabled: true
    state: started
  tags: ["{role_name}", service]

