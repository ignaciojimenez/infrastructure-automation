---
# {role_name} service role
#
# Required variables (must be set before running):
#   (none — document required vars here)
#
# Optional variables (see defaults/main.yml):
#   enable_{role_name}: true

# ============================================================
# Package Installation
# ============================================================

- name: Install {role_name} packages
  become: true
  ansible.builtin.apt:
    name: []  # Add package names here
    state: present
    update_cache: true
  when: os_family == "debian"
  tags: ["{role_name}", packages]

