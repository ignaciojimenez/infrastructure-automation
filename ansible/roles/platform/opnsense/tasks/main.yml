---
# OPNsense platform role - monitoring setup
# Deploys monitoring scripts and configures cron jobs for OPNsense firewall

- name: Ensure monitoring directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  loop:
    - "{{ scripts_dir }}"
    - "{{ scripts_dir }}/monitoring"
    - /var/run/monitoring-state
  become: true

- name: Deploy OPNsense-specific monitoring scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/services/opnsense/{{ item }}"
    dest: "{{ scripts_dir }}/monitoring/{{ item }}"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  loop:
    - check_crowdsec.sh
    - check_ddns.sh
    - check_gateway.sh
    - check_wg.sh
    - check_dns_health.sh
    - check_guest_agent.sh
    - check_system_health.sh
    - check_vpn_gateway.sh
    - monitor_dns_failover.sh
  become: true

- name: Remove legacy hyphenated monitoring scripts
  ansible.builtin.file:
    path: "{{ scripts_dir }}/monitoring/{{ item }}"
    state: absent
  loop:
    - check-crowdsec.sh
    - check-ddns.sh
    - check-ddns-age.sh
    - check-disk-space.sh
    - check-gateway.sh
    - check-interface.sh
    - check-memory.sh
    - check-system-load.sh
    - check-wg.sh
  become: true

- name: Remove legacy monitoring wrapper script
  ansible.builtin.file:
    path: "{{ scripts_dir }}/monitoring-wrapper.sh"
    state: absent
  become: true

- name: Deploy common monitoring wrapper (Bash version for OPNsense)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/common/enhanced_monitoring_wrapper"
    dest: "{{ scripts_dir }}/enhanced_monitoring_wrapper"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  become: true

- name: Deploy OPNsense WAN heartbeat script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/services/opnsense/heartbeat_opnsense_wan.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_opnsense_wan.sh"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  become: true
  when: vault_healthcheck_opnsense_wan is defined

- name: Deploy OPNsense DNS heartbeat script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/services/opnsense/heartbeat_dns.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_dns.sh"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  become: true
  when: vault_healthcheck_opnsense_dns is defined

- name: Install required packages
  community.general.pkgng:
    name:
      - bash
    state: present
  become: true

- name: Check if age is installed
  ansible.builtin.command: age --version
  register: age_check
  changed_when: false
  failed_when: false

- name: Install age encryption tool (static binary, not in OPNsense repos)
  ansible.builtin.shell:
    cmd: >
      fetch -o /tmp/age.tar.gz https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-freebsd-amd64.tar.gz
      && tar xzf /tmp/age.tar.gz -C /tmp
      && cp /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
      && chmod 755 /usr/local/bin/age /usr/local/bin/age-keygen
      && rm -rf /tmp/age /tmp/age.tar.gz
  become: true
  when: age_check.rc != 0

- name: Configure OPNsense monitoring cron jobs
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour | default('*') }}"
    user: "{{ infrastructure_user }}"
    job: "/usr/local/bin/bash {{ scripts_dir }}/enhanced_monitoring_wrapper --heartbeat-interval={{ item.heartbeat | default('daily') }} --monitoring-name={{ item.monitoring_name }} {{ logging_token }} {{ alert_token }} {{ scripts_dir }}/monitoring/{{ item.script }}"
    state: present
  loop:
    - name: "OPNsense CrowdSec check"
      minute: "*/30"
      heartbeat: "daily"
      monitoring_name: "opnsense_crowdsec"
      script: "check_crowdsec.sh"
    - name: "OPNsense DDNS check"
      minute: "0"
      hour: "*/6"
      heartbeat: "daily"
      monitoring_name: "opnsense_ddns"
      script: "check_ddns.sh"
    - name: "OPNsense gateway check"
      minute: "*/10"
      heartbeat: "daily"
      monitoring_name: "opnsense_gateway"
      script: "check_gateway.sh"
    - name: "OPNsense WireGuard check"
      minute: "*/10"
      heartbeat: "daily"
      monitoring_name: "opnsense_wg"
      script: "check_wg.sh"
    - name: "OPNsense DNS health check"
      minute: "*/5"
      heartbeat: "daily"
      monitoring_name: "opnsense_dns_health"
      script: "check_dns_health.sh"
    - name: "OPNsense guest agent check"
      minute: "0"
      hour: "*/6"
      heartbeat: "daily"
      monitoring_name: "opnsense_guest_agent"
      script: "check_guest_agent.sh"
    - name: "OPNsense system health check"
      minute: "*/30"
      heartbeat: "daily"
      monitoring_name: "opnsense_health"
      script: "check_system_health.sh"
    - name: "OPNsense VPN gateway tracking"
      minute: "*/15"
      heartbeat: "never"
      monitoring_name: "opnsense_vpn_gateway"
      script: "check_vpn_gateway.sh"
  become: true
  become_user: "{{ infrastructure_user }}"

# DNS failover runs directly (not via enhanced_monitoring_wrapper) because it's
# a state machine with its own Slack alerting and local logging fallback.
# Token order is REVERSED from wrapper pattern: alert_token first, logging_token second.
- name: Configure DNS failover monitoring cron job
  ansible.builtin.cron:
    name: "OPNsense DNS failover monitoring"
    minute: "*"
    user: "{{ infrastructure_user }}"
    job: "{{ scripts_dir }}/monitoring/monitor_dns_failover.sh {{ alert_token }} {{ logging_token }}"
    state: present
  become: true
  become_user: "{{ infrastructure_user }}"
  when:
    - alert_token is defined and alert_token != ''
    - logging_token is defined and logging_token != ''

- name: Configure OPNsense healthchecks.io WAN heartbeat
  ansible.builtin.cron:
    name: "Healthchecks.io - OPNsense WAN connectivity"
    minute: "*/5"
    user: "{{ infrastructure_user }}"
    job: "{{ scripts_dir }}/monitoring/heartbeat_opnsense_wan.sh"
    state: present
  become: true
  become_user: "{{ infrastructure_user }}"
  when: vault_healthcheck_opnsense_wan is defined

- name: Configure OPNsense healthchecks.io DNS heartbeat
  ansible.builtin.cron:
    name: "Healthchecks.io - OPNsense DNS resolution"
    minute: "*/5"
    user: "{{ infrastructure_user }}"
    job: "{{ scripts_dir }}/monitoring/heartbeat_dns.sh"
    state: present
  become: true
  become_user: "{{ infrastructure_user }}"
  when: vault_healthcheck_opnsense_dns is defined

# --- Legacy cron cleanup ---
# Remove manual cron entries that predate Ansible management

- name: Remove legacy manual DNS failover cron comment
  ansible.builtin.lineinfile:
    path: "/var/cron/tabs/{{ infrastructure_user }}"
    regexp: '^# DNS failover monitoring \(VPN-based\)'
    state: absent
  become: true

- name: Remove orphaned DNS health check cron comment
  ansible.builtin.lineinfile:
    path: "/var/cron/tabs/{{ infrastructure_user }}"
    regexp: '^# DNS resolution health check$'
    state: absent
  become: true

- name: Remove duplicate manual DNS failover cron job line
  ansible.builtin.shell:
    cmd: |
      CRONTAB=$(crontab -l -u {{ infrastructure_user }} 2>/dev/null)
      MATCHES=$(echo "$CRONTAB" | grep -c 'monitor_dns_failover\.sh' || true)
      if [ "$MATCHES" -gt 1 ]; then
        echo "$CRONTAB" | awk '
          /monitor_dns_failover\.sh/ && !seen { seen=1; next }
          { print }
        ' | crontab -u {{ infrastructure_user }} -
        echo "CHANGED"
      else
        echo "OK"
      fi
    executable: /bin/sh
  become: true
  register: cron_dedup
  changed_when: "'CHANGED' in cron_dedup.stdout"

# --- Backup ---

- name: Deploy OPNsense backup script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/services/opnsense/backup_opnsense.sh"
    dest: "{{ scripts_dir }}/backup_opnsense.sh"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  become: true

- name: Configure OPNsense backup cron job
  ansible.builtin.cron:
    name: "OPNsense configuration backup"
    minute: "15"
    hour: "4"
    job: >
      /usr/local/bin/bash {{ scripts_dir }}/enhanced_monitoring_wrapper
      --heartbeat-interval=daily
      --notify-fixed=true
      {{ logging_token }}
      {{ alert_token }}
      {{ scripts_dir }}/backup_opnsense.sh --silent --recipient={{ backup_age_pubkey }}
      >> {{ logs_dir }}/opnsense_config_backup.log 2>&1
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when:
    - logging_token is defined and logging_token != ''
    - alert_token is defined and alert_token != ''
    - backup_age_pubkey is defined and backup_age_pubkey != ''

- name: Deploy OPNsense backup freshness heartbeat
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/common/heartbeat_backup.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_backup_opnsense.sh"
    owner: "{{ infrastructure_user }}"
    group: wheel
    mode: '0755'
  become: true
  vars:
    backup_heartbeat_name: "OPNsense backup"
    backup_healthcheck_url: "{{ vault_healthcheck_backup_opnsense }}"
    backup_state_file: "/home/{{ infrastructure_user }}/.log/backup_opnsense.sh.json"
    backup_max_age_minutes: 1560
  when: vault_healthcheck_backup_opnsense is defined

- name: Configure OPNsense backup freshness heartbeat cron
  ansible.builtin.cron:
    name: "Healthchecks.io - OPNsense backup freshness"
    minute: "30"
    hour: "*/2"
    job: "{{ scripts_dir }}/monitoring/heartbeat_backup_opnsense.sh"
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when: vault_healthcheck_backup_opnsense is defined
