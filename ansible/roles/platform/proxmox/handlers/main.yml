---
# platform/proxmox role handlers

- name: Restart cwwk power tuning
  ansible.builtin.systemd:
    name: cwwk-power-tuning.service
    state: restarted
    daemon_reload: true
  become: true

- name: Restart journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted
  become: true
