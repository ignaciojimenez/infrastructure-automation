---
# Proxmox platform role - monitoring setup
# Deploys monitoring scripts and configures cron jobs for Proxmox hypervisor

- name: Ensure monitoring directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  loop:
    - "{{ scripts_dir }}"
    - "{{ scripts_dir }}/monitoring"
    - "{{ logs_dir }}"
    - /var/log/monitoring-state
  become: true

- name: Configure sudoers for monitoring commands
  ansible.builtin.copy:
    src: sudoers_monitoring
    dest: /etc/sudoers.d/monitoring
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

# --- Backup ---

- name: Deploy pve backup helper script (root-owned)
  ansible.builtin.copy:
    src: pve_backup_helper
    dest: /usr/local/bin/pve_backup_helper
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Configure sudoers for backup commands
  ansible.builtin.copy:
    src: sudoers_backup
    dest: /etc/sudoers.d/backup
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true

- name: Deploy Proxmox backup script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/services/proxmox/backup_proxmox_config.sh"
    dest: "{{ scripts_dir }}/backup_proxmox_config.sh"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  become: true

- name: Configure Proxmox backup cron job
  ansible.builtin.cron:
    name: "Proxmox configuration backup"
    minute: "0"
    hour: "4"
    day: "*/7"
    job: >
      {{ scripts_dir }}/enhanced_monitoring_wrapper
      --heartbeat-interval=always
      --notify-fixed=true
      {{ logging_token }}
      {{ alert_token }}
      {{ scripts_dir }}/backup_proxmox_config.sh --silent --recipient={{ backup_age_pubkey }}
      >> {{ logs_dir }}/proxmox_config_backup.log 2>&1
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when:
    - logging_token is defined and logging_token != ''
    - alert_token is defined and alert_token != ''
    - backup_age_pubkey is defined and backup_age_pubkey != ''

- name: Deploy Proxmox backup freshness heartbeat
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/common/heartbeat_backup.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_backup_proxmox.sh"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  become: true
  vars:
    backup_heartbeat_name: "Proxmox backup"
    backup_healthcheck_url: "{{ vault_healthcheck_backup_proxmox }}"
    backup_state_file: "/home/{{ infrastructure_user }}/.log/backup_proxmox_config.sh.json"
    backup_max_age_minutes: 10320
  when: vault_healthcheck_backup_proxmox is defined

- name: Configure Proxmox backup freshness heartbeat cron
  ansible.builtin.cron:
    name: "Healthchecks.io - Proxmox backup freshness"
    minute: "30"
    hour: "*/2"
    job: "{{ scripts_dir }}/monitoring/heartbeat_backup_proxmox.sh"
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when: vault_healthcheck_backup_proxmox is defined

# --- USB Recovery Drive ---

- name: Create USB recovery mount point
  ansible.builtin.file:
    path: /mnt/usb-recovery
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  when: enable_usb_recovery | default(false)

- name: Configure USB recovery drive in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '/mnt/usb-recovery'
    line: "UUID={{ usb_recovery_uuid }} /mnt/usb-recovery ext4 defaults,noatime,nofail,x-systemd.automount,x-systemd.device-timeout=10 0 2"
    state: present
  become: true
  when:
    - enable_usb_recovery | default(false)
    - usb_recovery_uuid is defined

- name: Deploy USB recovery helper script (root-owned)
  ansible.builtin.copy:
    src: usb_recovery_helper
    dest: /usr/local/bin/usb_recovery_helper
    owner: root
    group: root
    mode: '0755'
  become: true
  when: enable_usb_recovery | default(false)

- name: Configure sudoers for USB recovery
  ansible.builtin.copy:
    src: sudoers_usb_recovery
    dest: /etc/sudoers.d/usb_recovery
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  become: true
  when: enable_usb_recovery | default(false)

- name: Deploy USB recovery sync script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/services/proxmox/sync_usb_recovery.sh"
    dest: "{{ scripts_dir }}/sync_usb_recovery.sh"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  become: true
  when: enable_usb_recovery | default(false)

- name: Deploy recovery checklist template
  ansible.builtin.template:
    src: RECOVERY.txt.j2
    dest: "{{ scripts_dir }}/RECOVERY.txt"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0644'
  become: true
  when: enable_usb_recovery | default(false)

- name: Configure USB recovery sync cron job
  ansible.builtin.cron:
    name: "USB recovery drive sync"
    minute: "0"
    hour: "5"
    weekday: "0"
    job: >
      {{ scripts_dir }}/enhanced_monitoring_wrapper
      --heartbeat-interval=always
      --notify-fixed=true
      {{ logging_token }}
      {{ alert_token }}
      {{ scripts_dir }}/sync_usb_recovery.sh --silent
      >> {{ logs_dir }}/usb_recovery_sync.log 2>&1
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when:
    - enable_usb_recovery | default(false)
    - logging_token is defined and logging_token != ''
    - alert_token is defined and alert_token != ''

- name: Deploy USB recovery sync freshness heartbeat
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/common/heartbeat_backup.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_backup_usb_recovery.sh"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  become: true
  vars:
    backup_heartbeat_name: "USB recovery sync"
    backup_healthcheck_url: "{{ vault_healthcheck_backup_usb_recovery }}"
    backup_state_file: "/home/{{ infrastructure_user }}/.log/sync_usb_recovery.sh.json"
    backup_max_age_minutes: 10320
  when:
    - enable_usb_recovery | default(false)
    - vault_healthcheck_backup_usb_recovery is defined

- name: Configure USB recovery sync freshness heartbeat cron
  ansible.builtin.cron:
    name: "Healthchecks.io - USB recovery sync freshness"
    minute: "45"
    hour: "*/2"
    job: "{{ scripts_dir }}/monitoring/heartbeat_backup_usb_recovery.sh"
    user: "{{ infrastructure_user }}"
  become: true
  become_user: "{{ infrastructure_user }}"
  when:
    - enable_usb_recovery | default(false)
    - vault_healthcheck_backup_usb_recovery is defined

# --- Monitoring ---

- name: Deploy VM/CT configuration file
  ansible.builtin.template:
    src: vm_ct_config.txt.j2
    dest: "{{ scripts_dir }}/monitoring/vm_ct_config.txt"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0644'
  become: true
  # Always deploy - template auto-discovers VMs/CTs from inventory

- name: Deploy Proxmox-specific monitoring scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/services/proxmox/{{ item }}"
    dest: "{{ scripts_dir }}/monitoring/{{ item }}"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  loop:
    - check_proxmox_health.sh
    - check_vm_status.sh
    - check_zfs_health.sh
    - check_kernel_errors.sh
    - check_crash_dumps.sh
  become: true

- name: Deploy Proxmox heartbeat script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../scripts/services/proxmox/heartbeat_proxmox_health.sh"
    dest: "{{ scripts_dir }}/monitoring/heartbeat_proxmox_health.sh"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  become: true
  when: vault_healthcheck_proxmox_health is defined

- name: Deploy common monitoring scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/common/{{ item }}"
    dest: "{{ scripts_dir }}/{{ item }}"
    owner: "{{ infrastructure_user }}"
    group: "{{ infrastructure_group }}"
    mode: '0755'
  loop:
    - enhanced_monitoring_wrapper
  become: true

- name: Configure Proxmox monitoring cron jobs
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour | default('*') }}"
    user: "{{ infrastructure_user }}"
    job: "{{ scripts_dir }}/enhanced_monitoring_wrapper --heartbeat-interval={{ item.heartbeat | default('daily') }} --monitoring-name={{ item.monitoring_name }} {{ logging_token }} {{ alert_token }} {{ scripts_dir }}/monitoring/{{ item.script }}"
    state: present
  loop:
    - name: "Proxmox system health check"
      minute: "*/30"
      heartbeat: "daily"
      monitoring_name: "proxmox_health"
      script: "check_proxmox_health.sh"
    - name: "Proxmox VM status check"
      minute: "*/15"
      heartbeat: "daily"
      monitoring_name: "proxmox_vms"
      script: "check_vm_status.sh"
    - name: "Proxmox ZFS health check"
      minute: "0"
      hour: "*/6"
      heartbeat: "daily"
      monitoring_name: "proxmox_zfs"
      script: "check_zfs_health.sh"
    - name: "Proxmox kernel errors check"
      minute: "*/30"
      heartbeat: "daily"
      monitoring_name: "proxmox_kernel"
      script: "check_kernel_errors.sh"
    - name: "Proxmox crash dumps check"
      minute: "0"
      hour: "*"
      heartbeat: "daily"
      monitoring_name: "proxmox_crashes"
      script: "check_crash_dumps.sh"
  become: true
  become_user: "{{ infrastructure_user }}"

- name: Configure Proxmox healthchecks.io heartbeat
  ansible.builtin.cron:
    name: "Healthchecks.io - Proxmox critical health"
    minute: "*/10"
    user: "{{ infrastructure_user }}"
    job: "{{ scripts_dir }}/monitoring/heartbeat_proxmox_health.sh"
    state: present
  become: true
  become_user: "{{ infrastructure_user }}"
  when: vault_healthcheck_proxmox_health is defined
