---
# platform/proxmox role defaults

# Thermal headroom tuning (see docs/ARCHITECTURE_DECISIONS.md).
# The N355 is a ~15W-class part but ships with RAPL PL1=35W into a marginal cooler;
# capping sustained power keeps a future airflow loss in graceful-throttle territory
# instead of a silent THERMTRIP. No throughput impact at a 1 Gbps WAN.
enable_proxmox_power_tuning: true
proxmox_rapl_pl1_watts: 20        # sustained (long-term) package power cap; PL2 burst left at firmware default
proxmox_cpu_governor: powersave   # intel_pstate dynamic mode; still boosts to max under load

# Journald: explicit persistence + size cap (see docs/ARCHITECTURE_DECISIONS.md).
# 4G matches systemd's implicit ceiling and keeps ~3 months of forensic history
# at the observed ~1.2G/month; cwwk is the host where journal forensics matter most.
enable_persistent_journal: true
journald_system_max_use: 4G
journald_system_max_file_size: 128M   # 32 rotation slots at 4G; finer-grained vacuuming
