---
# Audio Playback role defaults
# Override in group_vars/audio_playback.yml or host_vars/

enable_mpd: true
enable_avahi: true
enable_airplay: true
enable_spotify: true

# Hardware configuration
configure_audio_volume: false
enable_audio_output_check: false

# HiFiBerry DAC overlay — set to the appropriate overlay for your hardware
# Examples: hifiberry-dacplus, hifiberry-dacplushd, hifiberry-dac
audio_dac_overlay: "hifiberry-dacplushd"

# Raspberry Pi config file path (differs between OS versions)
rpi_config_path: "/boot/firmware/config.txt"

# Shairport Sync — AirPlay receiver name (defaults to hostname)
shairport_airplay_name: "{{ ansible_hostname }}"

# Raspotify — publish Spotify Connect play/stop state to MQTT (same broker)
raspotify_mqtt_enabled: true

# Shairport Sync — MQTT now-playing publishing (broker = Mosquitto on dockassist)
shairport_mqtt_enabled: true
shairport_mqtt_broker: "dockassist"
shairport_mqtt_port: 1883
shairport_mqtt_topic: "shairport"
shairport_mqtt_publish_cover: false   # cover art over MQTT adds broker load

# Platform
disable_bluetooth: true
disable_hdmi: true
