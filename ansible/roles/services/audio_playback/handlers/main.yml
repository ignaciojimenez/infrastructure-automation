---
# Audio playback handlers

- name: Restart mpd
  become: true
  ansible.builtin.service:
    name: mpd
    state: restarted
  listen: restart mpd

- name: Restart shairport-sync
  become: true
  ansible.builtin.service:
    name: shairport-sync
    state: restarted
  listen: restart shairport-sync

- name: Restart raspotify
  become: true
  ansible.builtin.service:
    name: raspotify
    state: restarted
  listen: restart raspotify

- name: Restart avahi-daemon
  become: true
  ansible.builtin.service:
    name: avahi-daemon
    state: restarted
  listen: restart avahi-daemon

- name: Reboot for hardware changes
  become: true
  ansible.builtin.reboot:
    msg: "Rebooting to apply hardware configuration changes"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  listen: reboot for hardware changes
