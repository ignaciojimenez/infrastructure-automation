---
# Debian Baseline Configuration Tasks

- name: Update package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: [packages]

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - vim
      - jq
      - rsync
      - cron
      - sudo
      - python3-pip
      - iputils-ping
    state: present
  tags: [packages]

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone | default('Europe/Madrid') }}"
  register: timezone_set
  tags: [timezone]

# cron reads the timezone once at process start and never observes a later
# /etc/localtime change, so without this every job keeps firing at the old
# offset until something else restarts it. community.general.timezone does
# not do this for us — verified on cobra 2026-07-21, where cron was still
# running with the previous zone after the module reported "changed".
- name: Restart cron so it picks up the new timezone
  ansible.builtin.service:
    name: cron
    state: restarted
  when: timezone_set is changed
  tags: [timezone]

- name: Set ping capabilities for non-root users (LXC compatibility)
  ansible.builtin.command:
    cmd: setcap cap_net_raw+ep /bin/ping
  changed_when: false
  failed_when: false
  when: platform_type == "lxc"
  tags: [network, lxc]
