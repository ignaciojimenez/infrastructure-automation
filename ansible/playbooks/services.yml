---
# Service deployments
# Roles are auto-discovered by convention: if roles/services/{primary_function}/ exists,
# it is included automatically. No edits to this file are needed when adding a new role
# that matches a host's primary_function.
#
# For additional roles on a host, use install_* flags (e.g. install_docker: true).

- name: Configure SSH hardening
  hosts: all
  become: true
  handlers:
    - name: Import common handlers
      ansible.builtin.import_tasks: ../handlers/main.yml
  tasks:
    - name: Apply SSH hardening
      ansible.builtin.import_tasks: tasks/ssh_hardening.yml
      tags: [security, ssh]

- name: Pre-role setup tasks
  hosts: all
  become: true
  tasks:
    # Load role-specific variables based on primary_function
    - name: Check if role configuration exists
      ansible.builtin.stat:
        path: "{{ inventory_dir }}/group_vars/{{ primary_function }}.yml"
      register: role_config_file
      when: primary_function is defined
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Load role configuration
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/{{ primary_function }}.yml"
      when:
        - primary_function is defined
        - role_config_file.stat.exists | default(false)
      tags: [always]

    # Media host preparation - external storage and cobra scripts
    - name: Configure external storage for media hosts
      ansible.builtin.import_tasks: tasks/media_storage.yml
      when:
        - primary_function == "media"
        - external_drive_uuid is defined
      tags: [media, storage]

    - name: Install cobra automation scripts
      ansible.builtin.import_tasks: tasks/cobra_scripts.yml
      become: false
      when:
        - primary_function == "media"
        - enable_cobra_scripts | default(false)
      tags: [media, cobra]

- name: Deploy service roles
  hosts: all
  become: true
  tasks:
    # Auto-discover: include the role matching primary_function if it exists.
    # To add a new service, create roles/services/{new_role}/ — no changes here needed.
    - name: Check if role exists for primary_function
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../roles/services/{{ primary_function }}/tasks/main.yml"
      register: primary_role_exists
      when: primary_function is defined
      delegate_to: localhost
      become: false
      tags: [services, always]

    - name: Deploy primary function role
      ansible.builtin.include_role:
        name: "services/{{ primary_function }}"
      when:
        - primary_function is defined
        - primary_role_exists.stat.exists | default(false)
      tags: [services]

    # Explicit install_* overrides and primary_function fallbacks.
    # These cover roles where primary_function name ≠ role directory name,
    # or where one function maps to multiple roles (media → plex+transmission+samba).
    - name: Deploy Docker (explicit install)
      ansible.builtin.include_role:
        name: services/docker
      when: install_docker | default(false)
      tags: [docker, services]

    - name: Deploy Pi-hole
      ansible.builtin.include_role:
        name: services/pihole
      when: primary_function == "dns" or install_pihole | default(false)
      tags: [pihole, dns, services]

    - name: Deploy UniFi Network Controller
      ansible.builtin.include_role:
        name: services/unifi
      when: primary_function == "network_controller" or install_unifi | default(false)
      tags: [unifi, network, services]

    - name: Deploy Plex Media Server
      ansible.builtin.include_role:
        name: services/plex
      when: primary_function == "media" or install_plex | default(false)
      tags: [plex, media, services]

    - name: Deploy Transmission
      ansible.builtin.include_role:
        name: services/transmission
      when: primary_function == "media" or install_transmission | default(false)
      tags: [transmission, media, services]

    - name: Deploy Samba
      ansible.builtin.include_role:
        name: services/samba
      when: primary_function == "media" or install_samba | default(false)
      tags: [samba, media, services]

    - name: Deploy Home Assistant (explicit install)
      ansible.builtin.include_role:
        name: services/homeassistant
      when: install_homeassistant | default(false)
      tags: [homeassistant, services]

- name: Deploy monitoring infrastructure
  hosts: all
  become: true
  tasks:
    - name: Deploy monitoring infrastructure
      ansible.builtin.import_tasks: tasks/deploy_monitoring.yml
      when: enable_monitoring | default(true)
      tags: [monitoring, services]
