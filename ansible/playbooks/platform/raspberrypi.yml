---
# Raspberry Pi-specific configuration

- name: Configure Raspberry Pi specific settings
  hosts: raspberrypi
  become: true
  handlers:
    - name: Reboot required
      ansible.builtin.debug:
        msg: "Reboot required - will be handled at end of playbook"
      listen: "reboot_required"

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
      listen: "journald_config_changed"

    - name: Flush runtime journal to persistent storage
      ansible.builtin.command: journalctl --flush
      changed_when: true
      listen: "journald_config_changed"
  tasks:
    - name: Raspberry Pi memory optimizations
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-raspberry-pi.conf
      loop:
        - { name: 'vm.swappiness', value: '10' }
        - { name: 'vm.vfs_cache_pressure', value: '50' }
      when: platform_type == "raspberrypi"
      tags: [raspberrypi, optimization]

    # Persistent journal: default Storage=auto keeps logs in /run (lost on reboot),
    # which made the 2026-07-12 vinylstreamer reboot un-post-mortemable. Size caps
    # and compression bound SD-card wear on these small SD-backed hosts.
    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when:
        - platform_type == "raspberrypi"
        - enable_persistent_journal | default(true)
      tags: [raspberrypi, journald]

    - name: Configure persistent journald with SD-wear caps
      ansible.builtin.copy:
        content: |
          # Managed by Ansible (playbooks/platform/raspberrypi.yml) - do not edit
          [Journal]
          Storage=persistent
          Compress=yes
          SystemMaxUse={{ journald_system_max_use | default('100M') }}
          SystemMaxFileSize={{ journald_system_max_file_size | default('16M') }}
        dest: /etc/systemd/journald.conf.d/persistent.conf
        owner: root
        group: root
        mode: '0644'
      when:
        - platform_type == "raspberrypi"
        - enable_persistent_journal | default(true)
      notify: "journald_config_changed"
      tags: [raspberrypi, journald]

    - name: Disable Bluetooth overlay on Raspberry Pi
      ansible.builtin.lineinfile:
        path: /boot/config.txt
        line: "dtoverlay=disable-bt"
        state: present
        create: false
      when:
        - platform_type == "raspberrypi"
        - disable_bluetooth | default(true)
      tags: [raspberrypi, optimization, bluetooth]

    - name: Disable Bluetooth services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop:
        - hciuart.service
        - bluetooth.service
      ignore_errors: true
      when:
        - platform_type == "raspberrypi"
        - disable_bluetooth | default(true)
      tags: [raspberrypi, optimization, bluetooth]
      # Note: hciuart.service only exists on very old Pi/Raspbian versions
      # Modern systems won't have it - that's expected and OK

    - name: Create systemd service to disable HDMI on boot
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Disable HDMI to save power
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/vcgencmd display_power 0
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/disable-hdmi.service
        owner: root
        group: root
        mode: '0644'
      when:
        - platform_type == "raspberrypi"
        - disable_hdmi | default(true)
      register: hdmi_service
      tags: [raspberrypi, optimization, hdmi]

    - name: Reload systemd and restart disable-hdmi if changed
      ansible.builtin.systemd:
        name: disable-hdmi
        daemon_reload: true
        state: restarted
      when:
        - platform_type == "raspberrypi"
        - disable_hdmi | default(true)
        - hdmi_service is changed
      tags: [raspberrypi, optimization, hdmi]

    - name: Enable HDMI disable service
      ansible.builtin.systemd:
        name: disable-hdmi
        enabled: true
        daemon_reload: true
      when:
        - platform_type == "raspberrypi"
        - disable_hdmi | default(true)
      tags: [raspberrypi, optimization, hdmi]
