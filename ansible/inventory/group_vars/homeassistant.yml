---
# Home Assistant function vars
# Override ha_* person variables in group_vars/all/main.yml or host_vars/ for your setup.

# Services
enable_docker: true
enable_homeassistant: true
# NOTE: enable_cloudflare_tunnel and ha_* person entity variables are intentionally
# NOT defined here. Set them in group_vars/all/main.yml (native group_vars, precedence 3)
# to ensure they correctly override role defaults (precedence 1). If defined here via
# include_vars they would take precedence 17 and override main.yml (precedence 3).

# Hardware (auto-skipped on test environments)
disable_modemmanager: true

# Backup
enable_homeassistant_backup: true
homeassistant_backup_frequency: "daily"
homeassistant_backup_retention_days: 7

# Container
homeassistant_container_name: "home-assistant"
homeassistant_config_dir: "/home/{{ ansible_user }}/homeassistant"

# Internet Speed Monitoring
enable_internet_speed_check: true
internet_speed_min_download: 850
internet_speed_min_upload: 850
internet_speed_max_ping: 15
internet_speed_tests: 5
internet_speed_delay: 75

# Platform
disable_bluetooth: false  # Keep for BLE integrations
disable_hdmi: true
