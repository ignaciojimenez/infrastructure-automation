---
name: Ansible Lint

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "scripts/**"
      - ".ansible-lint"
      - ".github/workflows/ansible-lint.yml"
  pull_request:
    paths:
      - "ansible/**"
      - "scripts/**"
      - ".ansible-lint"
      - ".github/workflows/ansible-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      # Override ansible.cfg's vault_password_file (bin/vault_pass.sh reads the
      # macOS Keychain, which doesn't exist on the Linux runner — exits 127).
      ANSIBLE_VAULT_PASSWORD_FILE: ${{ github.workspace }}/.ansible-ci-vault-pass
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general community.docker ansible.posix

      - name: Create vault password file for CI
        run: echo "ci-dummy" > "$ANSIBLE_VAULT_PASSWORD_FILE"

      - name: Create minimal inventory for syntax check
        run: |
          cp ansible/inventory/hosts.yml.example ansible/inventory/hosts.yml
          cp ansible/inventory/group_vars/all/main.yml.example ansible/inventory/group_vars/all/main.yml
          cp ansible/inventory/group_vars/all/vault.yml.example ansible/inventory/group_vars/all/vault.yml
          # Encrypt dummy vault so ansible-vault can parse it
          ansible-vault encrypt ansible/inventory/group_vars/all/vault.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Jinja2 syntax check — all .j2 templates
        run: python3 scripts/ci/check_jinja_syntax.py

      - name: Syntax check — main playbooks
        run: |
          for pb in ansible/playbooks/*.yml; do
            echo "Checking: $pb"
            ansible-playbook "$pb" --syntax-check
          done

      - name: Validate role structure
        run: |
          failed=0
          for role in ansible/roles/services/*/; do
            role_name=$(basename "$role")
            # Skip the skeleton role
            [ "$role_name" = "_skeleton" ] && continue
            if [ ! -f "$role/tasks/main.yml" ]; then
              echo "FAIL: $role missing tasks/main.yml"
              failed=1
            fi
            if [ ! -f "$role/defaults/main.yml" ]; then
              echo "FAIL: $role missing defaults/main.yml"
              failed=1
            fi
          done
          exit $failed
